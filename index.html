<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chromatic Resonance 3D - PoC</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3CradialGradient id='g' cx='50%25' cy='50%25' r='50%25'%3E%3Cstop offset='0%25' stop-color='%23f5f0e6'/%3E%3Cstop offset='40%25' stop-color='%23d4a574'/%3E%3Cstop offset='70%25' stop-color='%237a5aaa'/%3E%3Cstop offset='100%25' stop-color='%231a1a2e'/%3E%3C/radialGradient%3E%3C/defs%3E%3Ccircle cx='16' cy='16' r='14' fill='url(%23g)' stroke='%23d4a574' stroke-width='2'/%3E%3Ccircle cx='12' cy='12' r='3' fill='%23c4574d' opacity='0.8'/%3E%3Ccircle cx='20' cy='12' r='2.5' fill='%234a8ab5' opacity='0.8'/%3E%3Ccircle cx='16' cy='20' r='2.5' fill='%235aaa7a' opacity='0.8'/%3E%3C/svg%3E">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #1a1a2e;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        #app {
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
        }

        #hud {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        #debug-info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #f5f0e6;
            font-size: 12px;
            font-family: monospace;
            background: rgba(26, 26, 46, 0.8);
            padding: 10px;
            border-radius: 4px;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border: 2px solid rgba(245, 240, 230, 0.5);
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s;
        }

        #crosshair.active {
            opacity: 1;
            border-color: #d4a574;
        }

        #color-tooltip {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(26, 26, 46, 0.9);
            color: #f5f0e6;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        #color-tooltip.visible {
            opacity: 1;
        }

        .color-preview {
            display: inline-block;
            width: 16px;
            height: 16px;
            border-radius: 3px;
            vertical-align: middle;
            margin-right: 8px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        #controls-hint {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(245, 240, 230, 0.6);
            font-size: 12px;
        }

        /* Loading overlay - visible immediately, hides when game is ready */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(ellipse at 50% 40%, #1a1a2e 0%, #0a0a14 70%, #050508 100%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Georgia', serif;
            color: #f5f0e6;
            transition: opacity 0.4s ease;
        }

        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-title {
            font-size: 28px;
            color: #d4a574;
            letter-spacing: 4px;
            margin-bottom: 24px;
            text-shadow: 0 0 20px rgba(212, 165, 116, 0.3);
        }

        .loading-status {
            font-size: 14px;
            color: #8888aa;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(212, 165, 116, 0.15);
            border-top-color: #d4a574;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="loading-title">CHROMATIC RESONANCE</div>
        <div class="loading-status" id="loading-status">Initializing...</div>
        <div class="loading-spinner"></div>
    </div>
    <div id="app"></div>
    <div id="hud">
        <div id="debug-info">
            <div>FPS: <span id="fps">0</span></div>
            <div>Wave: <span id="wave">1</span> (<span id="wave-progress">0/3</span>) | Score: <span id="score">0</span></div>
        </div>
        <div id="crosshair"></div>
        <div id="color-tooltip">
            <span class="color-preview"></span>
            <span class="color-name">Crimson</span>
        </div>
        <div id="controls-hint">WASD to move | Mouse to look | Click to extract color</div>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
