<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watercolor Skin Preview - POC</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            overflow: hidden;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        #ui-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 12px;
            min-width: 280px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
            z-index: 100;
        }
        h1 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #88aaff;
        }
        .section {
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 8px;
        }
        .skin-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .skin-btn {
            padding: 10px 8px;
            background: #2a2a4a;
            border: 2px solid #444;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-size: 11px;
            text-align: center;
            transition: all 0.2s;
        }
        .skin-btn:hover {
            background: #3a3a6a;
            border-color: #666;
        }
        .skin-btn.active {
            background: #4a4a8a;
            border-color: #88aaff;
        }
        .skin-btn .preview {
            width: 40px;
            height: 40px;
            margin: 0 auto 5px;
            border-radius: 4px;
            background-size: cover;
            background-position: center top;
        }
        .slider-group {
            margin-bottom: 12px;
        }
        .slider-group label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 4px;
        }
        .slider-group input[type="range"] {
            width: 100%;
        }
        #status {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 12px;
        }
        .color-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="ui-panel">
        <h1>Watercolor Skin Preview</h1>

        <div class="section">
            <div class="section-title">Character Skins</div>
            <div class="skin-grid" id="skin-buttons">
                <!-- Generated by JS -->
            </div>
        </div>

        <div class="section">
            <div class="section-title">Material Settings</div>
            <div class="slider-group">
                <label>
                    <span>Edge Softness</span>
                    <span id="edge-val">0.5</span>
                </label>
                <input type="range" id="edge-softness" min="0" max="1" step="0.05" value="0.5">
            </div>
            <div class="slider-group">
                <label>
                    <span>Bottom Bleed</span>
                    <span id="bleed-val">0.4</span>
                </label>
                <input type="range" id="bottom-bleed" min="0" max="1" step="0.05" value="0.4">
            </div>
            <div class="slider-group">
                <label>
                    <span>Tint Strength</span>
                    <span id="tint-val">0.25</span>
                </label>
                <input type="range" id="tint-strength" min="0" max="1" step="0.05" value="0.25">
            </div>
        </div>

        <div class="section">
            <div class="section-title">Animation</div>
            <div class="skin-grid">
                <button class="skin-btn" onclick="skinPreview.setAnimation('idle')">Idle</button>
                <button class="skin-btn" onclick="skinPreview.setAnimation('walk')">Walk</button>
                <button class="skin-btn" onclick="skinPreview.setAnimation('run')">Run</button>
            </div>
        </div>
    </div>

    <div id="status">Loading...</div>

    <script type="module" src="/src/skin-preview.js"></script>
</body>
</html>
